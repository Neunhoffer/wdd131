<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ponder - Objects</title>
  <!-- <link rel="stylesheet" href="styles.css"> -->
</head>
<body>
  <header>
    <h1 id="courseName"></h1>
    <h2 id="courseCode"></h2>
  </header>
  <main>
    <div class="enroll-form">
      <label for="sectionNumber">Section Number</label>
      <input id="sectionNumber" type="number" min="1" />
      <button id="enrollStudent">Enroll Student</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Section#</th>
          <th>Room#</th>
          <th>#Enrolled</th>
          <th>Days</th>
          <th>Instructor</th>
        </tr>
      </thead>
      <tbody id="sections"></tbody>
    </table>
  </main>
  <script src="ponder.js"></script>
</body>
</html>
