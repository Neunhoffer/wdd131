<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <h1>Event Ticket</h1>
    <form id="event-form" novalidate>
      <div class="row">
        <div class="form-group">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name" />
        </div>
        <div class="form-group">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
      </div>

      <div class="row">
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" name="type">
            <option value="">Choose one</option>
            <option value="student">Student</option>
            <option value="guest">Guest</option>
          </select>
        </div>
        <div class="form-group">
          <label for="event-date">Event Date</label>
          <input type="date" id="event-date" name="event-date" />
        </div>
      </div>

      <div class="form-group hidden" id="conditional-field">
        <label id="conditional-label" for="conditional-input">ID / Code</label>
        <input type="text" id="conditional-input" name="conditional-input" />
      </div>

      <button type="submit">Create Ticket</button>

      <div id="error-box" class="hidden">
        <p id="error-msg"></p>
      </div>
    </form>

    <div id="ticket" class="hidden">
      <h2>Ticket Created</h2>
      <p id="ticket-name"></p>
      <p id="ticket-type"></p>
      <p id="ticket-date"></p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
